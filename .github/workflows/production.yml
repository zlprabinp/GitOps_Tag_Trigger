name: Support Intelligence Backend CI/CD Pipeline for DEV

on:
  push:
    tags:
      - 'v*-rc*'

jobs:
  check_branch:
    runs-on: ubuntu-latest

    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      branch: ${{ steps.check.outputs.branch }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch ancestry
        id: check
        run: |
          git fetch origin main dev

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/dev; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "branch=dev" >> "$GITHUB_OUTPUT"

          elif git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"

          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-update-manifest:
    needs: check_branch
    if: needs.check_branch.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
